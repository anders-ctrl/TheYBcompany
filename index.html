<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YB Company | Wear the energy</title>
    <meta
      name="description"
      content="YB Company is a fashion label built around positivity, self-worth, and presence."
    />
    <style>
      :root {
        --bg: #0c0c0c;
        --panel: #151515;
        --text: #f5f1ea;
        --muted: #b8b0a6;
        --line: rgba(255,255,255,0.08);
        --accent: #e8d1a8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(180deg, #111 0%, #0a0a0a 100%);
        color: var(--text);
      }

      .container {
        width: min(1100px, calc(100% - 32px));
        margin: 0 auto;
      }

      .nav {
        border-bottom: 1px solid var(--line);
        background: rgba(12, 12, 12, 0.92);
      }

      .nav-inner {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px 0;
      }

      .logo {
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .hero {
        padding: 80px 0 48px;
      }

      .hero-box {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 48px;
      }

      .eyebrow {
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 12px;
        margin-bottom: 16px;
      }

      h1 {
        font-size: 64px;
        line-height: 0.95;
        margin: 0 0 20px;
      }

      .lead {
        color: var(--muted);
        font-size: 20px;
        line-height: 1.7;
        max-width: 760px;
      }

      .buttons {
        margin-top: 28px;
      }

      .button {
        display: inline-block;
        padding: 14px 22px;
        border-radius: 999px;
        margin-right: 12px;
        margin-bottom: 12px;
        text-decoration: none;
        font-weight: 700;
      }

      .button-primary {
        background: var(--accent);
        color: #111;
      }

      .button-secondary {
        border: 1px solid var(--line);
        color: var(--text);
      }

      .section {
        padding: 0 0 28px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 24px;
      }

      .card h3 {
        margin-top: 0;
        margin-bottom: 10px;
      }

      .card p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .cta {
        padding: 20px 0 60px;
      }

      .cta-box {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 32px;
      }

      footer {
        border-top: 1px solid var(--line);
        color: var(--muted);
        padding: 24px 0 40px;
      }

      @media (max-width: 900px) {
        h1 {
          font-size: 42px;
        }

        .grid {
          grid-template-columns: 1fr;
        }

        .hero-box,
        .cta-box {
          padding: 28px;
        }

        .lead {
          font-size: 18px;
        }
      }
    </style>
  </head>
  <body>
    <nav class="nav">
      <div class="container nav-inner">
        <div class="logo">YB Company</div>
      </div>
    </nav>

    <section class="hero">
      <div class="container">
        <div class="hero-box">
          <div class="eyebrow">Intentional fashion. Elevated energy.</div
